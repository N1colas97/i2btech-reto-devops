version: '3.8'
services:
  app:
    build: ./src
    volumes:
      - ./logs:/app/logs
  nginx:
    image: nginx:alpine
    container_name: i2b-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx:/etc/nginx/certs:ro # Aquí Nginx buscará server.crt y server.key
    depends_on:
      - app